## 协作规则

### 1. 文件锁（File-level Lock）
在修改任何文件前，**必须**：
1. 检查此文件是否存在
2. 如果存在，查看 `current_holder` 和 `file_locks`
3. 如果文件已被锁定，**必须**先联系持有者

### 2. 联系协议
- **方法 1**: 通过 Command Center (session-1778467414205-chwko5) 转达
- **方法 2**: 直接发消息到对方会话（如果知道 session key）
- **等待时间**: 超过 30 分钟无响应，可强制接管并注明原因

### 3. 释放锁
完成修改后，**必须**：
1. 更新 `file_locks` 中对应文件的状态为 `free`
2. 或删除此文件（如果全部解锁）

