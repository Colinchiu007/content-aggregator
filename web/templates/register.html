<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - Content Aggregator</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .auth-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .auth-card h1 {
            text-align: center;
            margin-bottom: 8px;
            color: #333;
        }
        .auth-card .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5eb;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            color: #666;
            font-size: 13px;
        }
        .auth-footer a {
            color: #667eea;
            text-decoration: none;
        }
        .error-message {
            background: #fee;
            color: #c00;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .success-message.show {
            display: block;
        }
        .password-strength {
            font-size: 12px;
            margin-top: 4px;
        }
        .password-strength.weak { color: #e74c3c; }
        .password-strength.medium { color: #f39c12; }
        .password-strength.strong { color: #27ae60; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>📝 注册</h1>
            <p class="subtitle">创建 Content Aggregator 账号</p>
            
            <div class="error-message" id="error-message"></div>
            <div class="success-message" id="success-message"></div>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required placeholder="请输入用户名（3-20 字符）">
                </div>
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" name="email" required placeholder="请输入邮箱">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required placeholder="请输入密码（6 位以上）">
                    <div class="password-strength" id="password-strength"></div>
                </div>
                <div class="form-group">
                    <label for="password_confirm">确认密码</label>
                    <input type="password" id="password_confirm" name="password_confirm" required placeholder="请再次输入密码">
                </div>
                <button type="submit" class="btn-primary" id="submit-btn">
                    注册
                </button>
            </form>
            
            <div class="auth-footer">
                已有账号？<a href="/login">立即登录</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('register-form');
        const errorEl = document.getElementById('error-message');
        const successEl = document.getElementById('success-message');
        const btn = document.getElementById('submit-btn');
        const passwordInput = document.getElementById('password');
        const strengthEl = document.getElementById('password-strength');

        // 密码强度检测
        passwordInput.addEventListener('input', () => {
            const pwd = passwordInput.value;
            if (pwd.length < 6) {
                strengthEl.textContent = '';
                return;
            }
            let score = 0;
            if (pwd.length >= 8) score++;
            if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) score++;
            if (/\d/.test(pwd)) score++;
            if (/[^a-zA-Z0-9]/.test(pwd)) score++;
            
            if (score <= 1) {
                strengthEl.textContent = '弱密码';
                strengthEl.className = 'password-strength weak';
            } else if (score <= 2) {
                strengthEl.textContent = '中等密码';
                strengthEl.className = 'password-strength medium';
            } else {
                strengthEl.textContent = '强密码';
                strengthEl.className = 'password-strength strong';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const password_confirm = document.getElementById('password_confirm').value;
            
            errorEl.classList.remove('show');
            successEl.classList.remove('show');
            
            if (password !== password_confirm) {
                errorEl.textContent = '两次密码输入不一致';
                errorEl.classList.add('show');
                return;
            }
            
            if (password.length < 6) {
                errorEl.textContent = '密码长度至少 6 位';
                errorEl.classList.add('show');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '注册中...';
            
            try {
                const resp = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await resp.json();
                
                if (resp.ok) {
                    successEl.textContent = '注册成功！3 秒后自动跳转到登录页...';
                    successEl.classList.add('show');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 3000);
                } else {
                    errorEl.textContent = data.detail || '注册失败，用户名可能已存在';
                    errorEl.classList.add('show');
                    btn.disabled = false;
                    btn.textContent = '注册';
                }
            } catch (err) {
                errorEl.textContent = '网络错误，请稍后重试';
                errorEl.classList.add('show');
                btn.disabled = false;
                btn.textContent = '注册';
            }
        });
    </script>
</body>
</html>
