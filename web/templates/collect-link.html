{% extends "base.html" %}
{% set active_page = 'collect_link' %}
{% block title %}链接采集 - Content Aggregator{% endblock %}

{% block content %}
<div class="page-header">
    <h1>📎 链接采集</h1>
</div>

<!-- 输入区域 -->
<div class="card" style="max-width:800px;margin-bottom:16px">
    <form id="collect-form" onsubmit="return handleCollect(event)">
        <div style="display:grid;grid-template-columns:1fr 200px auto;gap:16px;align-items:end;margin-bottom:20px">
            <!-- 链接输入 -->
            <div style="display:flex;flex-direction:column;gap:8px">
                <label class="form-label" style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:600">
                    粘贴链接
                    <span style="font-size:11px;text-transform:none;letter-spacing:0.3px;margin-left:8px;color:var(--primary);font-weight:normal">支持小红书、抖音</span>
                </label>
                <input class="form-input" name="url" id="collect-url" placeholder="https://www.xiaohongshu.com/explore/... 或 https://www.douyin.com/video/..." required style="width:100%;padding:10px 14px;border-radius:6px;background:var(--bg);color:var(--text);border:1px solid var(--border);font-size:14px;transition:all 0.2s ease">
            </div>

            <!-- 平台选择 -->
            <div style="display:flex;flex-direction:column;gap:8px">
                <label class="form-label" style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:600">目标平台</label>
                <select class="form-select" name="platform" id="platform-select" style="width:100%;padding:10px 12px;border-radius:6px;background:var(--bg);color:var(--text);border:1px solid var(--border);font-size:14px;cursor:pointer;transition:all 0.2s ease">
                    <option value="auto" selected>自动识别</option>
                    <option value="xiaohongshu">小红书</option>
                    <option value="douyin">抖音</option>
                </select>
            </div>

            <!-- 采集按钮 -->
            <div style="display:flex;flex-direction:column;gap:8px;justify-content:flex-end">
                <div style="height:21px"></div> <!-- label spacer -->
                <button type="submit" class="btn btn-primary" id="collect-btn" style="width:100%;padding:10px 24px;font-weight:600;font-size:14px;letter-spacing:0.5px;border-radius:6px;transition:all 0.3s ease;box-shadow:0 4px 16px rgba(59,130,246,0.4);cursor:pointer">
                    🚀 开始采集
                </button>
            </div>
        </div>
    </form>
</div>

<!-- 任务状态 -->
<div id="collect-status" style="display:none;max-width:800px;margin-bottom:16px">
    <div class="task-status" id="collect-task">
        <span class="spinner"></span>
        <span id="collect-message">采集初始化...</span>
        <div style="flex:1"></div>
        <div id="collect-progress-bar" style="width:200px;height:6px;background:var(--border);border-radius:3px;overflow:hidden">
            <div id="collect-progress-fill" style="width:0%;height:100%;background:linear-gradient(90deg, var(--primary), var(--accent));transition:width 0.3s ease"></div>
        </div>
        <span id="collect-progress-text" style="font-size:12px;color:var(--text-muted);min-width:40px;text-align:right">0%</span>
    </div>
</div>

<!-- 采集结果 -->
<div id="collect-result" style="display:none;max-width:800px">
    <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)">
            <h3 style="margin:0;font-size:16px;font-weight:600;color:var(--text)">📋 采集结果</h3>
            <div style="display:flex;gap:8px">
                <button class="btn btn-sm" onclick="rewriteResult()" style="padding:6px 12px;font-size:12px;border-radius:4px;background:var(--primary);color:white;border:none;cursor:pointer">✏️ 改写</button>
                <button class="btn btn-sm" onclick="exportResult()" style="padding:6px 12px;font-size:12px;border-radius:4px;background:var(--bg-card);color:var(--text);border:1px solid var(--border);cursor:pointer">📤 导出</button>
                <button class="btn btn-sm" onclick="saveResult()" style="padding:6px 12px;font-size:12px;border-radius:4px;background:var(--bg-card);color:var(--text);border:1px solid var(--border);cursor:pointer">💾 保存</button>
            </div>
        </div>

        <div style="display:grid;gap:20px">
            <!-- 标题 -->
            <div>
                <div style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:600;margin-bottom:8px">标题</div>
                <div id="result-title" style="font-size:18px;font-weight:600;color:var(--text);line-height:1.4"></div>
            </div>

            <!-- 元信息 -->
            <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--text-muted)">
                <span id="result-platform" style="display:inline-flex;align-items:center;gap:4px">
                    <span style="font-size:16px"></span>
                    <span></span>
                </span>
                <span id="result-author"></span>
                <span id="result-published"></span>
            </div>

            <!-- 原文案 -->
            <div id="result-original-section" style="display:none">
                <div style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:600;margin-bottom:8px">原文案</div>
                <div id="result-original" style="padding:12px;background:var(--bg);border-radius:var(--radius);font-size:14px;line-height:1.6;color:var(--text);max-height:300px;overflow-y:auto"></div>
            </div>

            <!-- ASR 转写文案 -->
            <div id="result-transcribed-section" style="display:none">
                <div style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:600;margin-bottom:8px">
                    ASR 转写文案
                    <span style="font-size:11px;text-transform:none;letter-spacing:0.3px;margin-left:8px;color:var(--warning)">视频语音转文字</span>
                </div>
                <div id="result-transcribed" style="padding:12px;background:var(--bg);border-radius:var(--radius);font-size:14px;line-height:1.6;color:var(--text);max-height:300px;overflow-y:auto;border-left:3px solid var(--warning)"></div>
            </div>

            <!-- 标签 -->
            <div id="result-tags-section" style="display:none">
                <div style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:600;margin-bottom:8px">标签</div>
                <div id="result-tags" style="display:flex;flex-wrap:wrap;gap:6px"></div>
            </div>
        </div>
    </div>
</div>

<!-- 错误提示 -->
<div id="collect-error" style="display:none;max-width:800px" class="card">
    <div style="padding:16px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:var(--radius);color:var(--danger);font-size:14px">
        ⚠️ <span id="collect-error-message"></span>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentTaskId = null;
let currentArticleId = null;
let ws = null;

async function handleCollect(e) {
    e.preventDefault();

    const url = document.getElementById('collect-url').value.trim();
    const platform = document.getElementById('platform-select').value;

    if (!url) {
        showError('请输入链接');
        return;
    }

    // 重置 UI
    document.getElementById('collect-status').style.display = 'block';
    document.getElementById('collect-result').style.display = 'none';
    document.getElementById('collect-error').style.display = 'none';
    document.getElementById('collect-message').textContent = '正在提交任务...';
    document.getElementById('collect-progress-fill').style.width = '0%';
    document.getElementById('collect-progress-text').textContent = '0%';
    document.getElementById('collect-btn').disabled = true;

    try {
        const formData = new FormData();
        formData.append('url', url);
        formData.append('platform', platform);

        const resp = await fetch('/api/collect-link', {
            method: 'POST',
            body: formData,
        });

        const data = await resp.json();
        if (data.task_id) {
            currentTaskId = data.task_id;
            connectWebSocket();
        } else {
            showError(data.error || '采集失败');
            resetUI();
        }
    } catch (err) {
        showError('网络错误：' + err.message);
        resetUI();
    }
}

function connectWebSocket() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${location.host}/ws`);

    ws.onopen = () => {
        console.log('[WS] 连接成功');
    };

    ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'task_update' && msg.task_id === currentTaskId) {
            updateProgress(msg);
        }
    };

    ws.onclose = () => {
        console.log('[WS] 连接关闭');
    };
}

function updateProgress(msg) {
    const { status, message, progress } = msg;

    document.getElementById('collect-message').textContent = message || status;

    if (progress !== undefined) {
        const pct = Math.min(100, Math.max(0, progress));
        document.getElementById('collect-progress-fill').style.width = pct + '%';
        document.getElementById('collect-progress-text').textContent = pct + '%';
    }

    if (status === 'done') {
        document.getElementById('collect-message').textContent = '✅ 采集成功';
        ws?.close();
        loadResult(currentTaskId);
        resetUI();
    } else if (status === 'error') {
        showError(message);
        ws?.close();
        resetUI();
    }
}

async function loadResult(taskId) {
    try {
        const resp = await fetch(`/api/tasks/${taskId}`);
        const data = await resp.json();

        if (data.status === 'done' && data.result) {
            currentArticleId = data.result.article_id;
            displayResult(currentArticleId);
        }
    } catch (err) {
        console.error('加载结果失败:', err);
    }
}

async function displayResult(articleId) {
    try {
        const resp = await fetch(`/api/articles/${articleId}`);
        const article = await resp.json();

        document.getElementById('result-title').textContent = article.title || '（无标题）';

        // 平台
        const platformSpan = document.getElementById('result-platform');
        if (article.source === 'xiaohongshu') {
            platformSpan.innerHTML = '<span style="font-size:16px">🔴</span><span>小红书</span>';
        } else if (article.source === 'douyin') {
            platformSpan.innerHTML = '<span style="font-size:16px">🎵</span><span>抖音</span>';
        }

        // 作者
        document.getElementById('result-author').textContent = article.author || '';

        // 发布时间
        if (article.published_at) {
            const d = new Date(article.published_at);
            document.getElementById('result-published').textContent = d.toLocaleDateString('zh-CN');
        }

        // 原文案
        if (article.original_text) {
            document.getElementById('result-original-section').style.display = 'block';
            document.getElementById('result-original').textContent = article.original_text;
        }

        // ASR 转写
        if (article.transcribed_text) {
            document.getElementById('result-transcribed-section').style.display = 'block';
            document.getElementById('result-transcribed').textContent = article.transcribed_text;
        }

        // 标签
        if (article.tags && article.tags.length > 0) {
            document.getElementById('result-tags-section').style.display = 'block';
            const tagsHtml = article.tags.map(t => `<span style="padding:4px 8px;background:var(--bg);border-radius:4px;font-size:12px;color:var(--text-muted)">${t}</span>`).join('');
            document.getElementById('result-tags').innerHTML = tagsHtml;
        }

        document.getElementById('collect-result').style.display = 'block';
    } catch (err) {
        console.error('显示结果失败:', err);
    }
}

function showError(msg) {
    document.getElementById('collect-error').style.display = 'block';
    document.getElementById('collect-error-message').textContent = msg;
}

function resetUI() {
    document.getElementById('collect-btn').disabled = false;
}

function rewriteResult() {
    if (!currentArticleId) return;
    // 跳转去改写页面，带入 article_id
    window.location.href = `/compose?article_id=${currentArticleId}`;
}

function exportResult() {
    if (!currentArticleId) return;
    // TODO: 调用导出 API
    alert('导出功能开发中...');
}

function saveResult() {
    // 已经自动保存了
    alert('已自动保存到文章列表');
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
    console.log('[Collect Link] 页面加载完成');
});
</script>
{% endblock %}
