<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - Content Aggregator</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .auth-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .auth-card h1 {
            text-align: center;
            margin-bottom: 8px;
            color: #333;
        }
        .auth-card .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5eb;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            color: #666;
            font-size: 13px;
        }
        .auth-footer a {
            color: #667eea;
            text-decoration: none;
        }
        .error-message {
            background: #fee;
            color: #c00;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .success-message {
            background: #efe;
            color: #090;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🔒 重置密码</h1>
            <p class="subtitle">请输入新密码</p>
            
            <div class="error-message" id="error-message"></div>
            <div class="success-message" id="success-message"></div>
            
            <form id="reset-form">
                <input type="hidden" id="token" name="token" value="">
                <div class="form-group">
                    <label for="new_password">新密码</label>
                    <input type="password" id="new_password" name="new_password" required placeholder="至少8位" minlength="8">
                </div>
                <div class="form-group">
                    <label for="confirm_password">确认新密码</label>
                    <input type="password" id="confirm_password" name="confirm_password" required placeholder="再次输入新密码" minlength="8">
                </div>
                <button type="submit" class="btn-primary" id="submit-btn">
                    重置密码
                </button>
            </form>
            
            <div class="auth-footer">
                <a href="/login">← 返回登录</a>
            </div>
        </div>
    </div>

    <script>
        // 从 URL 获取 token
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token') || '';
        document.getElementById('token').value = token;

        if (!token) {
            document.getElementById('error-message').textContent = '无效的重置链接（缺少 token）';
            document.getElementById('error-message').classList.add('show');
            document.getElementById('reset-form').style.display = 'none';
        }

        const form = document.getElementById('reset-form');
        const errorEl = document.getElementById('error-message');
        const successEl = document.getElementById('success-message');
        const btn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('new_password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            
            if (newPassword !== confirmPassword) {
                errorEl.textContent = '两次输入的密码不一致';
                errorEl.classList.add('show');
                return;
            }
            
            if (newPassword.length < 8) {
                errorEl.textContent = '密码长度至少8位';
                errorEl.classList.add('show');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '重置中...';
            errorEl.classList.remove('show');
            
            try {
                const resp = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: newPassword })
                });
                
                const data = await resp.json();
                
                if (resp.ok) {
                    successEl.textContent = (data.message || '密码重置成功') + '，即将跳转到登录页...';
                    successEl.classList.add('show');
                    form.style.display = 'none';
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    errorEl.textContent = data.detail || '重置失败，链接可能已过期';
                    errorEl.classList.add('show');
                    btn.disabled = false;
                    btn.textContent = '重置密码';
                }
            } catch (err) {
                errorEl.textContent = '网络错误，请稍后重试';
                errorEl.classList.add('show');
                btn.disabled = false;
                btn.textContent = '重置密码';
            }
        });
    </script>
</body>
</html>
