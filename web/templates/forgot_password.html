<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>忘记密码 - Content Aggregator v2</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .auth-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .auth-card h1 {
            text-align: center;
            margin-bottom: 8px;
            color: #333;
        }
        .auth-card .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5eb;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            color: #666;
            font-size: 13px;
        }
        .auth-footer a {
            color: #667eea;
            text-decoration: none;
        }
        .error-message {
            background: #fee;
            color: #c00;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .success-message {
            background: #efe;
            color: #090;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .success-message.show {
            display: block;
        }
        .reset-link-box {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
            word-break: break-all;
            font-size: 13px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🔑 忘记密码</h1>
            <p class="subtitle">输入注册邮箱,生成密码重置链接</p>

            <div class="error-message" id="error-message"></div>
            <div class="success-message" id="success-message"></div>

            <form id="forgot-form">
                <div class="form-group">
                    <label for="email">注册邮箱</label>
                    <input type="email" id="email" name="email" required placeholder="请输入注册邮箱">
                </div>
                <button type="submit" class="btn-primary" id="submit-btn">
                    发送重置链接
                </button>
            </form>

            <div class="auth-footer">
                <a href="/login">← 返回登录</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('forgot-form');
        const errorEl = document.getElementById('error-message');
        const successEl = document.getElementById('success-message');
        const btn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;

            btn.disabled = true;
            btn.textContent = '处理中...';
            errorEl.classList.remove('show');
            successEl.classList.remove('show');

            try {
                const resp = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await resp.json();

                if (resp.ok && data.email_registered) {
                    // 邮箱已注册，显示重置链接
                    let html = data.message || '重置链接已生成';
                    if (data.reset_link) {
                        html += '<br><br><strong>重置链接：</strong>'
                              + '<div class="reset-link-box">' 
                              + '<a href="' + data.reset_link + '" target="_blank">' 
                              + data.reset_link + '</a></div>'
                              + '<br><small>' + (data.note || '链接1小时内有效。请复制链接到浏览器打开。') + '</small>';
                    }
                    successEl.innerHTML = html;
                    successEl.classList.add('show');
                    errorEl.classList.remove('show');
                    form.style.display = 'none';
                } else {
                    // 邮箱未注册（或后端返回错误）
                    errorEl.textContent = data.message || '您输入的邮箱和用户信息不匹配，请重新输入。';
                    errorEl.classList.add('show');
                    successEl.classList.remove('show');
                    form.style.display = '';
                    btn.disabled = false;
                    btn.textContent = '发送重置链接';
                }
            } catch (err) {
                errorEl.textContent = '网络错误，请稍后重试';
                errorEl.classList.add('show');
                successEl.classList.remove('show');
                btn.disabled = false;
                btn.textContent = '发送重置链接';
            }
        });
    </script>
</body>
</html>
