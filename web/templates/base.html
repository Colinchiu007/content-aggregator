<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Content Aggregator{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --border: #334155;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --radius: 8px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* Layout */
        .layout { display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 20px 0;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-logo {
            padding: 0 20px 20px;
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            border-bottom: 1px solid var(--border);
            margin-bottom: 10px;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.15s;
        }

        .sidebar-nav a:hover, .sidebar-nav a.active {
            color: var(--text);
            background: var(--bg-hover);
        }

        .sidebar-nav a.active {
            border-right: 3px solid var(--primary);
            color: var(--primary);
        }

        /* Main */
        .main {
            margin-left: 220px;
            flex: 1;
            padding: 24px 32px;
            max-width: 1200px;
        }

        .page-header {
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .page-header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.15s;
            color: white;
        }

        .btn-primary { background: var(--primary); }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: #16a34a; }
        .btn-youtube { background: #FF0000; color: #fff; }
        .btn-youtube:hover { background: #CC0000; }
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: #dc2626; }
        .btn-warning { background: var(--warning); color: #000; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
        }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Forms */
        .form-group { margin-bottom: 16px; }

        .form-label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
            transition: border-color 0.15s;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-textarea { min-height: 200px; resize: vertical; font-family: monospace; }

        .form-check {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .form-check input[type="checkbox"] {
            width: 16px;
            height: 16px;
        }

        /* Table */
        .table-wrapper { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        th {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:hover { background: var(--bg-hover); }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-primary { background: #3b82f633; color: #60a5fa; }
        .badge-success { background: #22c55e33; color: #4ade80; }
        .badge-warning { background: #f59e0b33; color: #fbbf24; }
        .badge-danger { background: #ef444433; color: #f87171; }
        .badge-muted { background: #64748b33; color: #94a3b8; }

        /* Tags */
        .tag {
            display: inline-block;
            padding: 2px 8px;
            background: #334155;
            border-radius: 4px;
            font-size: 12px;
            color: var(--text-muted);
            margin: 2px;
        }

        /* Task status */
        .task-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .task-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .task-dot.pending { background: var(--text-muted); }
        .task-dot.running { background: var(--primary); animation: pulse 1s infinite; }
        .task-dot.done { background: var(--success); }
        .task-dot.error { background: var(--danger); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--text-muted);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Empty state */
        .empty {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .empty-icon { font-size: 48px; margin-bottom: 12px; }

        /* Source grid */
        .source-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
        }

        .source-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            transition: border-color 0.15s;
        }

        .source-card:hover { border-color: var(--primary); }

        .source-card h3 { font-size: 15px; margin-bottom: 4px; }
        .source-card p { font-size: 13px; color: var(--text-muted); }

        /* Pagination */
        .pagination {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 20px;
        }

        .pagination a, .pagination span {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
            color: var(--text-muted);
        }

        .pagination a:hover { border-color: var(--primary); color: var(--primary); }
        .pagination .active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* Toast notification */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: var(--radius);
            font-size: 14px;
            animation: slideIn 0.3s;
            max-width: 400px;
        }

        .toast-success { background: var(--success); color: white; }
        .toast-error { background: var(--danger); color: white; }
        .toast-info { background: var(--primary); color: white; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Article content preview */
        .article-content {
            max-height: 300px;
            overflow: hidden;
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.8;
        }

        .article-content.expanded {
            max-height: none;
        }

        /* Two column */
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; padding: 16px; }
            .two-col { grid-template-columns: 1fr; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">📰 Content Aggregator</div>
            <nav class="sidebar-nav">
                <a href="/" {% if active_page == 'dashboard' %}class="active"{% endif %}>📊 仪表盘</a>
                <a href="/articles" {% if active_page == 'articles' %}class="active"{% endif %}>📝 文章列表</a>
                <a href="/sources" {% if active_page == 'sources' %}class="active"{% endif %}>🔌 数据源</a>
                <a href="/settings" {% if active_page == 'settings' %}class="active"{% endif %}>⚙️ 数据源配置</a>
                <a href="/compose" {% if active_page == 'compose' %}class="active"{% endif %}>✏️ 手动输入</a>
                <a href="/tasks" {% if active_page == 'tasks' %}class="active"{% endif %}>⏳ 任务列表</a>
                <a href="/scheduler" {% if active_page == 'scheduler' %}class="active"{% endif %}>🕐 定时调度</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script>

        // Toast 通知
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // 工具函数
        function formatTime(iso) {
            if (!iso) return '-';
            const d = new Date(iso);
            return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        function truncate(str, len) {
            if (!str) return '';
            return str.length > len ? str.slice(0, len) + '...' : str;
        }

        async function apiPost(url, formData) {
            const resp = await fetch(url, { method: 'POST', body: formData });
            return resp.json();
        }

        async function apiDelete(url) {
            const resp = await fetch(url, { method: 'DELETE' });
            return resp.json();
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
