# Content Aggregator 配置示例
# 复制此文件为 config.yaml 并填入实际值
# secrets (api_key 等) 建议通过环境变量设置

# ==================== LLM 配置 ====================
llm:
  # provider: deepseek / openai / qwen
  provider: "deepseek"
  
  # 模型选择
  model: "deepseek-chat"
  
  # API Key - 建议通过环境变量设置: ${LLM_API_KEY}
  # 或直接填入（仅本地使用）: "sk-xxx"
  api_key: "${LLM_API_KEY}"
  
  # API 地址（可选）
  base_url: "https://api.deepseek.com"
  
  # 生成参数
  max_tokens: 4096
  temperature: 0.7
  timeout: 120
  
  # 并发限制
  max_concurrency: 3

# ==================== HTTP 配置 ====================
http:
  timeout: 30
  max_retries: 3
  # 代理地址（可选，留空则直连）
  proxy: ""

# ==================== 数据库配置 ====================
database:
  path: "./data/content.db"

# ==================== 导出配置 ====================
export:
  output_dir: "./output/exports"
  default_format: "markdown"
  filename_template: "{title}_{date}.{ext}"

# ==================== RSS 源配置 ====================
sources:
  # 阮一峰网络日志
  - name: "ruanyifeng"
    url: "http://feeds.feedburner.com/ruanyifeng"
    enabled: true
    rewrite:
      strategy: "PARAPHRASE"
      # 可覆盖全局 rewrite 配置
      
  # 科技爱好者周刊
  - name: "weekly"
    url: "https://github.com/ruanyf/weekly/commits.atom"
    enabled: false
    rewrite:
      strategy: "SUMMARIZE"

  # 添加更多源...
  # - name: "source-name"
  #   url: "https://example.com/rss.xml"
  #   enabled: true

# ==================== 改写配置 ====================
rewrite:
  # 默认策略: SUMMARIZE / STYLE_TRANSFER / PARAPHRASE / REWRITE / EXPAND / SHORT_VIDEO
  strategy: "PARAPHRASE"

  # 自定义提示词模板（可选）
  # 策略 key 与 strategy 枚举值对应:
  #   summarize / style_transfer / paraphrase / rewrite / expand / short_video
  # 优先级: RewriteConfig.custom_prompt > prompts[strategy] > 内置默认值
  prompts:
    # 示例：短视频文案改写（这是默认值，可以自定义覆盖）
    short_video: |
      根据下面要求改写：
      你是一名专业的短视频文案仿写专家...

    # 示例：自定义深度改写（替换内置默认值）
    rewrite: |
      你是一个专业的文章改写助手。请对原文进行深度改写...
      （留空则使用内置默认值）

# ==================== 翻译配置 ====================
translation:
  # 默认目标语言: en / ja / ko / fr / de / es / pt / ru / ar / vi
  default_language: "en"
  # 语气风格: formal / casual / academic
  tone: "casual"
  # 是否保留原文 Markdown 格式
  preserve_formatting: true
  # 自定义翻译提示词（覆盖默认，优先级最高）
  # custom_prompt: |
  #   你的自定义翻译提示词...

# ==================== 定时任务配置 ====================
scheduler:
  # 是否启用定时任务
  enabled: false
  # 最大并发任务数
  max_concurrent_tasks: 5
  # 任务列表
  tasks:
    # 示例：每 6 小时执行一次 RSS 采集
    # - name: "rss_hourly"
    #   type: "interval"
    #   interval_seconds: 21600
    #   enabled: true
    #   sources: ["ruanyifeng"]
