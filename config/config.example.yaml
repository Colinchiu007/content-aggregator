    keywords: []
      # - name: "搜索关键词"
      #   keyword: "tech"

  wechat:
    api_key: null  # 第三方 API Key（如新榜 API）
    accounts: []
      # - name: "我的公众号"
      #   biz: "MzA3..."
      #   name: "公众号名称"

  sitemap:
    sites: []
      # - name: "我的网站"
      #   base_url: "https://example.com"
      #   include: ["/blog/"]    # 只采集包含这些路径的 URL
      #   exclude: ["/tag/", "/page/"]  # 排除这些路径

  api:
    endpoints: []
      # - name: "我的 API"
      #   api_url: "https://api.example.com/posts"
      #   method: "GET"
      #   headers:
      #     Authorization: "Bearer xxx"
      #   params:
      #     limit: 20
      #   json_path: "$.data.articles"
      #   auth:
      #     - "username"
      #     - "password"

# 改写策略配置
rewrite:
  strategy: "PARAPHRASE"  # SUMMARIZE / STYLE_TRANSFER / PARAPHRASE / REWRITE / EXPAND
  prompt_template: |
    请将以下文章进行改写，要求：
    1. 保持原文核心观点不变
    2. 语言风格更加生动、通俗易懂
    3. 适当加入个人见解
    4. 删除广告和无关内容

    原文：
    {content}

    请直接输出改写后的文章，不要添加任何说明。

# 格式化配置
formatter:
  markdown:
    include_metadata: true
    metadata_fields: ["title", "author", "source", "date", "tags"]
  html:
    use_inline_styles: true
    font_size: 17
    line_height: 1.75
    font_family: "Helvetica Neue, Helvetica, Arial, sans-serif"

# 翻译配置
translation:
  enabled: false
  default_language: "EN"  # EN / JA / KO / FR / DE / ES / PT / RU / AR / VI
  tone: "casual"  # formal / casual / academic
  preserve_formatting: true

# ============================================================
# 过滤配置
# ============================================================
# 内容过滤：敏感词过滤 + 去重

filter:
  # 敏感词过滤
  sensitive:
    enabled: true  # 是否启用敏感词过滤
    strict_mode: false  # false=替换敏感词为*, true=直接拦截
    replace_char: "*"  # 替换敏感词的字符
    # 敏感词列表（支持正则表达式，格式: 正则|普通词）
    words:
      # 违法违规类
      - "色情"
      - "赌博"
      - "毒品"
      - "暴力"
      - "恐怖"
      # 诈骗传销类
      - "诈骗"
      - "传销"
      - "非法集资"
      - "资金盘"
      # 营销推广类
      - "加微信"
      - "加QQ"
      - "扫码"
      - "免费领"
      - "点击就送"
      - "限时特惠"
      - "全网最低价"
      - "私信领取"
      # 博彩彩票类
      - "时时彩"
      - "双色球"
      - "赌博网站"
      # 医疗药品类（虚假广告）
      - "根治"
      - "特效药"
      - "祖传秘方"
    # 自定义正则（可选）
    patterns:
      - "\d{10,20}@\w+\.\w+"  # 邮箱
      - "V[vx]\d{8,}"  # 微信号

  # 去重过滤
  dedup:
    enabled: true  # 是否启用去重
    exact_dedup: true  # 精确去重（MD5 hash）
    fuzzy_dedup: true  # 模糊去重（相似度匹配）
    similarity_threshold: 0.8  # 相似度阈值 0-1，越高越严格
    min_length: 50  # 最小内容长度，低于此值不进行模糊去重

# 定时任务配置
scheduler:
  enabled: false
  jobs: []
    # - name: "每日新闻"
    #   type: "INTERVAL"  # INTERVAL / CRON / ONCE
    #   interval_hours: 6
    #   sources: ["rss"]
    # - name: "工作日提醒"
    #   type: "CRON"
    #   cron: "0 9 * * 1-5"