# Content Aggregator Configuration
# 内容聚合与改写平台配置文件

# LLM 配置 - 用于文章改写/翻译
llm:
  provider: "deepseek"  # deepseek / openai / qwen
  model: "deepseek-v4-pro"
  api_key: "YOUR_DEEPSEEK_API_KEY"
  base_url: "https://api.deepseek.com"  # 可选，自定义API地址
  max_tokens: 2000
  temperature: 0.7
  max_concurrency: 3

# HTTP 配置
http:
  timeout: 30
  max_retries: 3
  # 代理配置（国内访问外网时需要，设为 null 则直连）
  proxy: null  # "http://127.0.0.1:12334"
  # 代理不可用时的行为：skip=跳过该源，retry=重试直连（默认 skip）
  proxy_fallback: "skip"  # skip | retry

# 数据库配置
database:
  path: "./data/content.db"

# 导出配置
export:
  output_dir: "./output/exports"
  default_format: "markdown"
  filename_template: "{title}_{date}.{ext}"

# ============================================================
# 数据源配置
# ============================================================
# 所有源在网络错误时自动跳过，不中断流程，并输出友好提示
# 配置项留空即表示该源未启用

sources:
  # 内置采集器
  rss:
    - name: "阮一峰网络日志"
      url: "http://feeds.feedburner.com/ruanyifeng"
      enabled: true
    - name: "科技爱好者周刊"
      url: "https://github.com/ruanyf/weekly/commits.atom"
      enabled: false

  youtube:
    api_key: null  # YouTube Data API v3 Key，免费额度每天 10000 单位
    channels: []
      # - name: "我的频道"
      #   channel_id: "UC..."
      #   playlist_id: "LL..."  # 从频道上传列表获取

  twitter:
    bearer_token: null  # Twitter API v2 Bearer Token
    users: []
      # - name: "我的关注"
      #   username: "example"
    queries: []
      # - name: "搜索关键词"
      #   query: "tech news lang:en"

  tiktok:
    session_id: null  # TikTok Cookie 中的 sessionid
    users: []
      # - name: "我的关注"
      #   sec_uid: "MS4wLjABAAAA..."

  douyin:
    cookie: null  # 抖音网页登录 Cookie
    client_key: null  # 抖音开放平台应用 Key
    users: []
      # - name: "我的关注"
      #   sec_uid: "MS4wLjABAAAA..."
