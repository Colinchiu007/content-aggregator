    #   cron: "0 18 * * 1-5"
    #   enabled: true
    #   sources: ["ruanyifeng"]
    #   translate:
    #     language: "en"
    #   export_formats: ["markdown"]

# ==================== 格式化配置 ====================
formatter:
  # Markdown 配置
  markdown:
    include_metadata: true
    metadata_fields: ["title", "author", "source", "date", "tags"]
  
  # HTML 配置（微信内联样式）
  html:
    use_inline_styles: true
    font_size: 17
    line_height: 1.75
    font_family: "Helvetica Neue, Helvetica, Arial, sans-serif"
