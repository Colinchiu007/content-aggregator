rewrite:
  strategy: PARAPHRASE
  prompt_template: '请将以下文章进行改写，要求：

    1. 保持原文核心观点不变

    2. 语言风格更加生动、通俗易懂

    3. 适当加入个人见解

    4. 删除广告和无关内容


    原文：

    {content}


    请直接输出改写后的文章，不要添加任何说明。

    '
formatter:
  markdown:
    include_metadata: true
    metadata_fields:
    - title
    - author
    - source
    - date
    - tags
  html:
    use_inline_styles: true
    font_size: 17
    line_height: 1.75
    font_family: Helvetica Neue, Helvetica, Arial, sans-serif
translation:
  enabled: false
  default_language: EN
  tone: casual
  preserve_formatting: true
